<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>X Media Downloader</title>
<style>
  :root {
    --bg:       #ffffff;
    --bg2:      #f7f7f7;
    --bg3:      #efefef;
    --text:     #0f0f0f;
    --muted:    #666;
    --border:   rgba(0,0,0,0.10);
    --accent:   #0f0f0f;
    --green:    #1a7a3a;
    --green-bg: #eaf4ee;
    --red:      #a32d2d;
    --red-bg:   #fdf0f0;
    --amber:    #7a4e00;
    --amber-bg: #fff8e6;
    --radius:   10px;
    --radius-sm:6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:       #1a1a1a;
      --bg2:      #222;
      --bg3:      #2c2c2c;
      --text:     #f0f0f0;
      --muted:    #999;
      --border:   rgba(255,255,255,0.10);
      --accent:   #f0f0f0;
      --green:    #5dcaa5;
      --green-bg: #0a2a1e;
      --red:      #f09595;
      --red-bg:   #2a0a0a;
      --amber:    #fac775;
      --amber-bg: #1e1200;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 360px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px 12px;
    border-bottom: 0.5px solid var(--border);
  }
  .logo {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo svg { width: 16px; height: 16px; fill: var(--bg); }
  .header-text .title { font-size: 14px; font-weight: 600; color: var(--text); }
  .header-text .sub   { font-size: 11px; color: var(--muted); }
  .status-dot {
    margin-left: auto;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--bg3);
    flex-shrink: 0;
  }
  .status-dot.online  { background: #1a7a3a; }
  .status-dot.offline { background: #a32d2d; }

  /* Tabs */
  .tabs {
    display: flex;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg2);
  }
  .tab-btn {
    flex: 1;
    padding: 8px 0;
    border: none;
    background: none;
    font-size: 12px;
    font-family: inherit;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    border-bottom: 2px solid transparent;
  }
  .tab-btn.active {
    color: var(--text);
    border-bottom-color: var(--accent);
    background: var(--bg);
  }

  /* Body */
  .body { padding: 14px 16px; }

  /* URL input area */
  .url-row {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .url-input {
    flex: 1;
    padding: 8px 10px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg2);
    color: var(--text);
    font-size: 12px;
    font-family: monospace;
    outline: none;
    transition: border 0.15s;
  }
  .url-input:focus { border-color: var(--accent); }
  .btn-paste {
    padding: 8px 10px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg2);
    color: var(--muted);
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .btn-paste:hover { background: var(--bg3); color: var(--text); }

  /* Options row */
  .opts-row {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }
  select {
    flex: 1;
    padding: 7px 8px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg2);
    color: var(--text);
    font-size: 12px;
    font-family: inherit;
    outline: none;
    cursor: pointer;
  }

  /* Main download button */
  .btn-download {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-download:hover   { opacity: 0.85; }
  .btn-download:disabled { opacity: 0.45; cursor: not-allowed; }

  /* Current page auto-detect */
  .auto-detect {
    background: var(--amber-bg);
    border: 0.5px solid rgba(186,117,23,0.3);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    margin-bottom: 10px;
    display: none;
  }
  .auto-detect.visible { display: flex; align-items: center; gap: 8px; }
  .auto-detect-label  { font-size: 11px; color: var(--amber); flex: 1; }
  .btn-use-page {
    font-size: 11px;
    padding: 4px 8px;
    border: 0.5px solid rgba(186,117,23,0.4);
    border-radius: 4px;
    background: none;
    color: var(--amber);
    cursor: pointer;
    font-family: inherit;
  }

  /* Status / result */
  .result-box {
    margin-top: 10px;
    padding: 10px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    display: none;
  }
  .result-box.visible { display: block; }
  .result-box.success { background: var(--green-bg); color: var(--green); border: 0.5px solid rgba(29,158,117,0.25); }
  .result-box.error   { background: var(--red-bg);   color: var(--red);   border: 0.5px solid rgba(226,75,74,0.25); }
  .result-box.loading { background: var(--bg2); color: var(--muted); border: 0.5px solid var(--border); }

  /* Spinner */
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--bg);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .btn-download.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Download history */
  .dl-list { display: flex; flex-direction: column; gap: 6px; }
  .dl-item {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dl-icon {
    width: 24px; height: 24px;
    background: var(--bg3);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 11px;
    color: var(--muted);
  }
  .dl-name  { font-size: 12px; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dl-time  { font-size: 10px; color: var(--muted); flex-shrink: 0; }
  .empty-state { text-align: center; color: var(--muted); padding: 20px 0; font-size: 12px; }

  /* Settings */
  .setting-row { margin-bottom: 12px; }
  .setting-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500; }
  .setting-row input[type=text] {
    width: 100%;
    padding: 7px 10px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg2);
    color: var(--text);
    font-size: 12px;
    font-family: monospace;
    outline: none;
  }
  .setting-row input:focus { border-color: var(--accent); }
  .checkbox-row { display: flex; align-items: center; gap: 8px; }
  .checkbox-row input { cursor: pointer; }
  .checkbox-row label { font-size: 12px; color: var(--text); cursor: pointer; }
  .btn-save {
    width: 100%;
    padding: 9px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.85; }
  .save-msg { font-size: 11px; color: var(--green); text-align: center; margin-top: 6px; min-height: 16px; }

  .api-health {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
  }
  .health-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--bg3); }
  .health-dot.ok  { background: #1a7a3a; }
  .health-dot.bad { background: #a32d2d; }
  .health-dot.checking { background: var(--amber); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .divider { border: none; border-top: 0.5px solid var(--border); margin: 12px 0; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.73-8.835L1.254 2.25H8.08l4.262 5.638 5.902-5.638Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
  </div>
  <div class="header-text">
    <div class="title">X Media Downloader</div>
    <div class="sub">Powered by Railway</div>
  </div>
  <div class="status-dot" id="status-dot" title="Backend status"></div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" data-tab="download">Download</button>
  <button class="tab-btn"        data-tab="history">History</button>
  <button class="tab-btn"        data-tab="settings">Settings</button>
</div>

<!-- TAB: DOWNLOAD -->
<div id="tab-download" class="body">

  <div class="auto-detect" id="auto-detect">
    <span class="auto-detect-label" id="auto-detect-label">Detected: tweet/…</span>
    <button class="btn-use-page" id="btn-use-page">Use this URL</button>
  </div>

  <div class="url-row">
    <input type="text" class="url-input" id="url-input" placeholder="https://x.com/user/status/…" />
    <button class="btn-paste" id="btn-paste">Paste</button>
  </div>

  <div class="opts-row">
    <select id="sel-quality">
      <option value="best">Best quality</option>
      <option value="1080p">1080p</option>
      <option value="720p">720p</option>
      <option value="480p">480p</option>
      <option value="audio">Audio only</option>
    </select>
    <select id="sel-format">
      <option value="mp4">MP4</option>
      <option value="mkv">MKV</option>
      <option value="webm">WebM</option>
    </select>
  </div>

  <button class="btn-download" id="btn-download">
    <div class="spinner" id="spinner"></div>
    <span id="btn-label">Download media</span>
  </button>

  <div class="result-box" id="result-box"></div>
</div>

<!-- TAB: HISTORY -->
<div id="tab-history" class="body" style="display:none;">
  <div class="dl-list" id="dl-list">
    <div class="empty-state">No downloads yet</div>
  </div>
</div>

<!-- TAB: SETTINGS -->
<div id="tab-settings" class="body" style="display:none;">
  <div class="setting-row">
    <div class="setting-label">Railway API URL</div>
    <input type="text" id="api-url-input" placeholder="https://your-app.railway.app" />
    <div class="api-health" id="api-health">
      <div class="health-dot" id="health-dot"></div>
      <span id="health-label">Not checked</span>
    </div>
  </div>

  <div class="setting-row">
    <div class="setting-label">Default quality</div>
    <select id="s-quality">
      <option value="best">Best available</option>
      <option value="1080p">Max 1080p</option>
      <option value="720p">Max 720p</option>
      <option value="480p">Max 480p</option>
      <option value="audio">Audio only</option>
    </select>
  </div>

  <div class="setting-row">
    <div class="setting-label">Default format</div>
    <select id="s-format">
      <option value="mp4">MP4</option>
      <option value="mkv">MKV</option>
      <option value="webm">WebM</option>
    </select>
  </div>

  <div class="setting-row">
    <div class="setting-label">Proxy mode</div>
    <div class="checkbox-row">
      <input type="checkbox" id="s-proxy" />
      <label for="s-proxy">Route downloads through Railway proxy (fixes CORS issues)</label>
    </div>
  </div>

  <hr class="divider" />
  <button class="btn-save" id="btn-save">Save settings</button>
  <div class="save-msg" id="save-msg"></div>
</div>

<script src="popup.js"></script>
</body>
</html>
